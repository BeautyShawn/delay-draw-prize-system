<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>中奖记录 - 活动页</title>
  <link rel="stylesheet" href="/assets/mobile.css">
</head>
<body>
  <div class="mobile-shell">
    <div class="page">
      <section class="hero">
        <div class="eyebrow">我的奖品</div>
        <h1>中奖记录与领奖进度</h1>
        <p>统一查看历次活动的中奖结果、领奖状态和对应的兑换入口，避免遗漏任何一次权益领取。</p>
        <div class="directory" data-mobile-directory></div>
      </section>

      <section class="card">
        <div class="metrics">
          <div class="metric"><strong>3</strong><span>累计中奖</span></div>
          <div class="metric"><strong>1</strong><span>待兑换</span></div>
          <div class="metric"><strong>2</strong><span>已发放</span></div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">记录列表</h2>
        <div class="record-list">
          <div class="record-item">
            <div>
              <span class="status-badge status-win">待兑换</span>
              <strong style="margin-top:10px;">2026 双11福利大抽奖</strong>
              <div class="subtle">二等奖：AirPods Pro 2 · 中奖码 749102</div>
              <div class="subtle">开奖时间：2026-02-28 20:00</div>
            </div>
            <div class="record-side">
              <a class="btn btn-primary" href="/m-redeem.html" style="padding:10px 14px;display:inline-block;">去兑换</a>
            </div>
          </div>
          <div class="record-item">
            <div>
              <span class="status-badge status-win">已发放</span>
              <strong style="margin-top:10px;">春节集卡活动</strong>
              <div class="subtle">三等奖：88 元红包 · 自动到账</div>
              <div class="subtle">到账时间：2026-01-29 21:15</div>
            </div>
            <div class="record-side">
              <div class="badge">已到账</div>
            </div>
          </div>
          <div class="record-item">
            <div>
              <span class="status-badge status-win">已签收</span>
              <strong style="margin-top:10px;">年终宠粉福利场</strong>
              <div class="subtle">一等奖：品牌投影仪 · 中奖码 221905</div>
              <div class="subtle">物流单号：YT5289001288</div>
            </div>
            <div class="record-side">
              <div class="badge">已完成</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
  <script src="/assets/mobile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>奖品兑换 - 活动页</title>
  <link rel="stylesheet" href="/assets/mobile.css">
</head>
<body>
  <div class="mobile-shell">
    <div class="page">
      <section class="hero">
        <div class="eyebrow">奖品兑换页</div>
        <h1>填写领奖信息</h1>
        <p>请确认联系方式和收货地址，提交后系统将进入审核流程。实物奖品审核通过后安排发货，虚拟奖励则会自动到账。</p>
        <div class="directory" data-mobile-directory></div>
      </section>

      <section class="card">
        <div class="reward-card">
          <div class="subtle" style="color:#8b621d;">当前待兑换奖品</div>
          <strong>二等奖：AirPods Pro 2</strong>
          <div style="margin-top:8px;">中奖抽奖码：749102 · 领奖截止：2026-03-02 20:00</div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">收货信息</h2>
        <div class="form-grid">
          <input class="input" value="用户小明" aria-label="收件人">
          <input class="input" value="138 0000 0000" aria-label="手机号">
          <input class="input" value="上海市徐汇区漕溪北路 398 号" aria-label="详细地址">
        </div>
        <div class="cta-row">
          <a class="btn btn-primary" href="/m-records.html">提交兑奖信息</a>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">其他兑奖方式</h2>
        <div class="benefit-list">
          <div class="benefit-item">
            <strong>虚拟券码类奖品</strong>
            <div class="subtle">审核通过后自动发放到“我的卡券”，无需填写地址。</div>
          </div>
          <div class="benefit-item">
            <strong>红包 / 积分类奖品</strong>
            <div class="subtle">开奖后即时到账，可在资产页查看入账记录。</div>
          </div>
        </div>
      </section>

      <div class="footer-note">兑奖成功后，可在中奖记录页持续查看审核与发货状态。</div>
    </div>
  </div>
  <script src="/assets/mobile.js"></script>
</body>
</html>

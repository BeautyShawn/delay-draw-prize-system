<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券管理 - 后台配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .table-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 text-gray-700">

<div class="flex h-screen overflow-hidden">
    <!-- 左侧菜单 -->
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="px-6 py-8 border-b">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fa-solid fa-shop"></i>
                电商后台
            </h1>
        </div>
        <nav class="flex-1 px-3 py-6 space-y-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-100 rounded-xl">
                <i class="fa-solid fa-chart-line w-5"></i>
                <span>仪表盘</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-100 rounded-xl">
                <i class="fa-solid fa-box w-5"></i>
                <span>商品管理</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-100 rounded-xl">
                <i class="fa-solid fa-list-check w-5"></i>
                <span>订单管理</span>
            </a>
            <!-- 当前选中 -->
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 font-medium rounded-2xl">
                <i class="fa-solid fa-ticket w-5"></i>
                <span>优惠券管理</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-100 rounded-xl">
                <i class="fa-solid fa-users w-5"></i>
                <span>用户管理</span>
            </a>
        </nav>
        <div class="p-4 border-t text-xs text-gray-400">
            当前版本 v2.3.1
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 flex flex-col">
        <!-- 顶部栏 -->
        <header class="h-16 bg-white border-b flex items-center px-8 justify-between">
            <div class="flex items-center gap-4">
                <h2 class="text-2xl font-semibold text-gray-800">优惠券配置</h2>
                <span class="px-3 py-1 bg-green-100 text-green-700 text-sm rounded-full font-medium">共 12 张优惠券</span>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="relative">
                    <input type="text" id="searchInput" 
                           class="w-72 bg-gray-100 border border-transparent focus:border-blue-300 rounded-2xl px-5 py-2 text-sm outline-none transition"
                           placeholder="搜索优惠券码 / 名称...">
                    <i class="fa-solid fa-magnifying-glass absolute right-5 top-3 text-gray-400"></i>
                </div>
                
                <button onclick="showAddModal()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl flex items-center gap-2 font-medium transition">
                    <i class="fa-solid fa-plus"></i>
                    新增优惠券
                </button>
                
                <div class="w-9 h-9 bg-gray-200 rounded-2xl overflow-hidden">
                    <img src="https://picsum.photos/128/128?random=1" alt="admin" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <!-- 表格区域 -->
        <div class="flex-1 overflow-auto p-8">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="text-left py-5 px-8 font-medium text-gray-500">优惠券码</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">名称</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">类型</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">折扣值</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">是否叠加</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">优先级</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">有效期</th>
                            <th class="text-left py-5 px-4 font-medium text-gray-500">库存/已用</th>
                            <th class="text-center py-5 px-8 font-medium text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="couponTable" class="text-sm divide-y">
                        <!-- JS 动态渲染 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑弹窗 -->
<div id="couponModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden">
        <!-- 标题 -->
        <div class="px-8 py-6 border-b flex items-center justify-between">
            <h3 id="modalTitle" class="text-2xl font-semibold">新增优惠券</h3>
            <button onclick="hideModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        
        <form id="couponForm" onsubmit="handleSubmit(event)" class="p-8 space-y-8">
            <input type="hidden" id="editId">
            
            <!-- 基础信息 -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">优惠券码 <span class="text-red-500">*</span></label>
                    <input type="text" id="code" required
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none text-lg font-mono">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">优惠券名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="name" required
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
            </div>

            <!-- 折扣类型 -->
            <div class="grid grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">折扣类型 <span class="text-red-500">*</span></label>
                    <select id="discount_type" onchange="togglePercentageField()" 
                            class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                        <option value="fixed_amount">固定金额减免</option>
                        <option value="percentage">百分比折扣</option>
                        <option value="full_reduction">满减优惠</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2" id="valueLabel">折扣金额 (元) <span class="text-red-500">*</span></label>
                    <input type="number" id="discount_value" step="0.01" required
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
                
                <!-- 百分比封顶（仅百分比显示） -->
                <div id="maxDiscountGroup" class="hidden">
                    <label class="block text-sm font-medium mb-2">最高封顶金额 (元)</label>
                    <input type="number" id="max_discount_amount" step="0.01" placeholder="不填则不封顶"
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
            </div>

            <!-- 叠加配置 -->
            <div class="grid grid-cols-2 gap-6">
                <div class="flex items-center gap-4 bg-gray-50 p-5 rounded-3xl">
                    <label class="flex-1 cursor-pointer">
                        <input type="checkbox" id="allow_stack" checked class="w-5 h-5 accent-blue-600">
                        <span class="ml-3 font-medium">允许与其他优惠券叠加</span>
                    </label>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">叠加优先级 <span class="text-xs text-gray-400">(数值越大越优先)</span></label>
                    <input type="number" id="stack_priority" value="100" 
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
            </div>

            <!-- 使用门槛 -->
            <div class="grid grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">最低订单金额 (元)</label>
                    <input type="number" id="min_order_amount" value="0" step="0.01"
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">每人最多使用</label>
                    <input type="number" id="max_use_per_user" value="1"
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">总库存</label>
                    <input type="number" id="total_stock" value="100"
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
            </div>

            <!-- 时间与状态 -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">开始时间</label>
                    <input type="datetime-local" id="start_time" required
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">结束时间</label>
                    <input type="datetime-local" id="end_time" required
                           class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-blue-500 outline-none">
                </div>
            </div>

            <div class="flex items-center gap-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="status" checked class="w-5 h-5 accent-blue-600">
                    <span class="font-medium">立即生效</span>
                </label>
            </div>

            <!-- 底部按钮 -->
            <div class="flex gap-4 pt-6 border-t">
                <button type="button" onclick="hideModal()"
                        class="flex-1 py-4 text-gray-500 font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
                    取消
                </button>
                <button type="submit"
                        class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl transition">
                    保存优惠券
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Tailwind 脚本初始化
function initTailwind() {
    // 已通过 CDN 引入，无需额外操作
}

// 模拟数据
let coupons = [
    {
        id: 1,
        code: "NEW100",
        name: "新人立减100元",
        discount_type: "fixed_amount",
        discount_value: 100,
        max_discount_amount: null,
        allow_stack: 0,
        stack_priority: 200,
        min_order_amount: 200,
        total_stock: 500,
        used_count: 87,
        start_time: "2026-03-01 00:00",
        end_time: "2026-04-01 23:59",
        status: 1
    },
    {
        id: 2,
        code: "SPRING20",
        name: "春季8折优惠",
        discount_type: "percentage",
        discount_value: 0.8,
        max_discount_amount: 150,
        allow_stack: 1,
        stack_priority: 150,
        min_order_amount: 0,
        total_stock: 999,
        used_count: 234,
        start_time: "2026-03-10 00:00",
        end_time: "2026-03-20 23:59",
        status: 1
    },
    {
        id: 3,
        code: "FULL200",
        name: "满200减50",
        discount_type: "full_reduction",
        discount_value: 50,
        max_discount_amount: null,
        allow_stack: 1,
        stack_priority: 100,
        min_order_amount: 200,
        total_stock: 300,
        used_count: 45,
        start_time: "2026-02-01 00:00",
        end_time: "2026-05-01 23:59",
        status: 1
    }
];

// 渲染表格
function renderTable() {
    const tbody = document.getElementById('couponTable');
    tbody.innerHTML = '';
    
    coupons.forEach(c => {
        const typeText = {
            fixed_amount: '固定减免',
            percentage: '百分比',
            full_reduction: '满减'
        }[c.discount_type];
        
        const row = document.createElement('tr');
        row.className = 'table-row';
        row.innerHTML = `
            <td class="py-6 px-8 font-mono font-medium">${c.code}</td>
            <td class="py-6 px-4">${c.name}</td>
            <td class="py-6 px-4">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium
                    ${c.discount_type === 'percentage' ? 'bg-purple-100 text-purple-700' : 
                      c.discount_type === 'fixed_amount' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}">
                    ${typeText}
                </span>
            </td>
            <td class="py-6 px-4 font-medium">
                ${c.discount_type === 'percentage' ? 
                    (c.discount_value * 100) + '%' + (c.max_discount_amount ? `（封顶${c.max_discount_amount}元）` : '') : 
                    '¥' + c.discount_value}
            </td>
            <td class="py-6 px-4">
                <span class="${c.allow_stack ? 'text-emerald-600' : 'text-red-500'} font-medium">
                    ${c.allow_stack ? '✅ 可叠加' : '❌ 不可叠加'}
                </span>
            </td>
            <td class="py-6 px-4 text-center font-mono">${c.stack_priority}</td>
            <td class="py-6 px-4 text-xs text-gray-500">
                ${c.start_time}<br>${c.end_time}
            </td>
            <td class="py-6 px-4">
                <div class="flex items-center gap-2">
                    <span class="font-medium">${c.total_stock}</span>
                    <span class="text-gray-400">/</span>
                    <span class="text-gray-500">${c.used_count}</span>
                </div>
            </td>
            <td class="py-6 px-8 text-center">
                <button onclick="editCoupon(${c.id})" 
                        class="text-blue-600 hover:text-blue-700 mr-4">
                    <i class="fa-solid fa-pen"></i>
                </button>
                <button onclick="deleteCoupon(${c.id})" 
                        class="text-red-500 hover:text-red-600">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        `;
        tbody.appendChild(row);
    });
}

// 显示新增弹窗
function showAddModal() {
    document.getElementById('modalTitle').textContent = '新增优惠券';
    document.getElementById('couponForm').reset();
    document.getElementById('editId').value = '';
    
    // 默认值
    document.getElementById('discount_type').value = 'fixed_amount';
    document.getElementById('allow_stack').checked = true;
    document.getElementById('stack_priority').value = 100;
    document.getElementById('start_time').value = '2026-03-10T00:00';
    document.getElementById('end_time').value = '2026-04-10T23:59';
    
    togglePercentageField();
    document.getElementById('couponModal').classList.remove('hidden');
    document.getElementById('couponModal').classList.add('flex');
}

// 编辑
function editCoupon(id) {
    const coupon = coupons.find(c => c.id === id);
    if (!coupon) return;
    
    document.getElementById('modalTitle').textContent = '编辑优惠券';
    document.getElementById('editId').value = coupon.id;
    document.getElementById('code').value = coupon.code;
    document.getElementById('name').value = coupon.name;
    document.getElementById('discount_type').value = coupon.discount_type;
    document.getElementById('discount_value').value = coupon.discount_value;
    document.getElementById('max_discount_amount').value = coupon.max_discount_amount || '';
    document.getElementById('allow_stack').checked = !!coupon.allow_stack;
    document.getElementById('stack_priority').value = coupon.stack_priority;
    document.getElementById('min_order_amount').value = coupon.min_order_amount;
    document.getElementById('max_use_per_user').value = 1; // 示例
    document.getElementById('total_stock').value = coupon.total_stock;
    document.getElementById('start_time').value = coupon.start_time.replace(' ', 'T');
    document.getElementById('end_time').value = coupon.end_time.replace(' ', 'T');
    document.getElementById('status').checked = !!coupon.status;
    
    togglePercentageField();
    document.getElementById('couponModal').classList.remove('hidden');
    document.getElementById('couponModal').classList.add('flex');
}

// 删除
function deleteCoupon(id) {
    if (!confirm('确定要删除这张优惠券吗？')) return;
    coupons = coupons.filter(c => c.id !== id);
    renderTable();
}

// 隐藏弹窗
function hideModal() {
    const modal = document.getElementById('couponModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

// 切换百分比字段显示
function togglePercentageField() {
    const type = document.getElementById('discount_type').value;
    const maxGroup = document.getElementById('maxDiscountGroup');
    const valueLabel = document.getElementById('valueLabel');
    
    if (type === 'percentage') {
        maxGroup.classList.remove('hidden');
        valueLabel.textContent = '折扣比例 (0.XX 例如 0.85 = 85折)';
        document.getElementById('discount_value').placeholder = '0.85';
        document.getElementById('discount_value').step = '0.01';
    } else {
        maxGroup.classList.add('hidden');
        valueLabel.textContent = type === 'fixed_amount' ? '折扣金额 (元)' : '满减金额 (元)';
        document.getElementById('discount_value').placeholder = '';
        document.getElementById('discount_value').step = '0.01';
    }
}

// 表单提交
function handleSubmit(e) {
    e.preventDefault();
    
    const id = document.getElementById('editId').value ? parseInt(document.getElementById('editId').value) : Date.now();
    
    const newCoupon = {
        id: id,
        code: document.getElementById('code').value,
        name: document.getElementById('name').value,
        discount_type: document.getElementById('discount_type').value,
        discount_value: parseFloat(document.getElementById('discount_value').value),
        max_discount_amount: document.getElementById('max_discount_amount').value ? 
                            parseFloat(document.getElementById('max_discount_amount').value) : null,
        allow_stack: document.getElementById('allow_stack').checked ? 1 : 0,
        stack_priority: parseInt(document.getElementById('stack_priority').value),
        min_order_amount: parseFloat(document.getElementById('min_order_amount').value) || 0,
        total_stock: parseInt(document.getElementById('total_stock').value),
        used_count: 0,
        start_time: document.getElementById('start_time').value.replace('T', ' '),
        end_time: document.getElementById('end_time').value.replace('T', ' '),
        status: document.getElementById('status').checked ? 1 : 0
    };
    
    // 更新或新增
    const existingIndex = coupons.findIndex(c => c.id === id);
    if (existingIndex > -1) {
        coupons[existingIndex] = newCoupon;
    } else {
        coupons.unshift(newCoupon);
    }
    
    renderTable();
    hideModal();
    
    // 提示
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-8 right-8 bg-green-600 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3';
    toast.innerHTML = `<i class="fa-solid fa-check"></i> 保存成功！`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// 搜索功能
document.getElementById('searchInput').addEventListener('input', function() {
    const term = this.value.toLowerCase();
    const filtered = coupons.filter(c => 
        c.code.toLowerCase().includes(term) || 
        c.name.toLowerCase().includes(term)
    );
    
    // 简单实现：重新渲染全部（实际项目可优化）
    const tbody = document.getElementById('couponTable');
    tbody.innerHTML = '';
    filtered.forEach(c => {
        // 复用上面一样的渲染逻辑（此处省略重复代码，实际项目中可提取函数）
        // 为演示直接调用完整 renderTable 并过滤显示
    });
    // 简化演示：直接刷新全部（生产环境请自行优化）
    renderTable();
});

// 初始化
window.onload = function() {
    initTailwind();
    renderTable();
    
    // 默认选中第一个百分比示例
    console.log('%c✅ 优惠券后台静态页面已就绪！\n可直接复制保存为 .html 文件使用', 'color:#3b82f6;font-size:14px');
};
</script>

</body>
</html>

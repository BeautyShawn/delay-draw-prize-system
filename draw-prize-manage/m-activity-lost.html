<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>开奖未中奖 - 活动页</title>
  <link rel="stylesheet" href="/assets/mobile.css">
</head>
<body>
  <div class="mobile-shell">
    <div class="page">
      <section class="hero">
        <div class="eyebrow">开奖结果已公布</div>
        <h1>这次差一点，下次好运继续</h1>
        <p>你的 3 个抽奖码已全部参与开奖。本次未中奖，但系统为你准备了一份安慰奖励，继续参与下一场抽奖吧。</p>
        <div class="directory" data-mobile-directory></div>
      </section>

      <section class="card result-panel">
        <div class="result-icon result-lost-icon">◎</div>
        <span class="status-badge status-lost">开奖未中奖</span>
        <h2 class="section-title">谢谢参与</h2>
        <div class="tips">本次活动未中奖，已为你发放 20 积分 + 5 元优惠券，可在下次活动中继续使用。</div>
      </section>

      <section class="card">
        <h2 class="section-title">本次参与号码</h2>
        <div class="code-list">
          <div class="code-item"><strong>628413</strong><div class="subtle">状态：未中奖</div></div>
          <div class="code-item"><strong>749102</strong><div class="subtle">状态：未中奖</div></div>
          <div class="code-item"><strong>315794</strong><div class="subtle">状态：未中奖</div></div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">安慰奖励</h2>
        <div class="benefit-list">
          <div class="benefit-item"><strong>20 积分已到账</strong><div class="subtle">可直接用于积分商城兑换。</div></div>
          <div class="benefit-item"><strong>5 元优惠券待领取</strong><div class="subtle">有效期 7 天，下单满 39 元可用。</div></div>
        </div>
        <div class="cta-row">
          <a class="btn btn-primary" href="/m-activity-new.html">再抽一次</a>
          <a class="btn btn-secondary" href="/m-records.html">查看我的记录</a>
        </div>
      </section>
    </div>
  </div>
  <script src="/assets/mobile.js"></script>
</body>
</html>
